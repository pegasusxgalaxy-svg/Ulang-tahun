<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Selamat Ulang Tahun 🎂</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#000);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.container{
text-align:center;
display:none;
padding:20px;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:40px;
background:#ff4d8d;
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff4d8d;
}

h1{
font-size:32px;
color:gold;
text-shadow:0 0 15px gold;
margin-bottom:20px;
}

.cake{
font-size:100px;
margin:20px 0;
}.message{
display:none;
animation:fade 1s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.confetti{
position:fixed;
top:-10px;
font-size:24px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container" id="start">
<button onclick="mulai()">🎉 Buka Ucapan 🎉</button>
</div>

<div class="container message" id="pesan">
<h1>🎂 Selamat Ulang Tahun! 🎂</h1>

<div class="cake">🎂</div>

<p>
Semoga panjang umur, sehat selalu,
dimudahkan semua urusannya,
semoga semua impianmu tercapai,
dan selalu diberikan kebahagiaan.
🥳🎉🎁
</p><br><br>

<button onclick="location.reload()">🔄 Ulangi</button>

</div>

<script>
const start=document.getElementById("start");
const pesan=document.getElementById("pesan");

window.onload=()=>{
start.style.display="block";
};

function mulai(){
start.style.display="none";
pesan.style.display="block";

setInterval(()=>{
const c=document.createElement("div");
c.className="confetti";
c.innerHTML=["🎉","🎊","✨","🎈","🎁"][Math.floor(Math.random()*5)];
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},5000);

},200);
}
</script>

</body>
</html>
